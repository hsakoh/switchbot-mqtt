name: "SwitchBot-Mqtt"
description: "Integrate SwitchBot Devices into Home Assistant via MQTT"
version: "1.1.0"
slug: "switchbot_mqtt"
url: "https://github.com/hsakoh/switchbot-mqtt"
ports:
  8098/tcp: 8098
startup: application
boot: manual
init: false
arch:
  - aarch64
  - amd64
  - armv7
services:
  - 'mqtt:need'
ingress: true
options:
  Mqtt: 
    AutoConfig: true
    Host: ''
    Port: 1883
    Id: ''
    Pw: ''
    Tls: false
  SwitchBot: 
    ApiBaseUrl: 'https://api.switch-bot.com/v1.1/'
    ApiKey: ''
    ApiSecret: ''
  EnforceDeviceTypes:
    - DeviceId : 'E2F67E000000(Example)'
      DeviceType : 'Curtain'
  WebhookService: 
    TunnelMode: 'TryCloudflare'
    NgrokAuthToken: '<Required when TunnelMode is Ngrok>'
    HostUrl: '<Required when TunnelMode is HostUrl or CloudflareZeroTrust>'
    CloudflareTunnelToken: '<Required when TunnelMode is CloudflareZeroTrust>'
  MessageRetain:
    Entity: true
    State: false
  ImageFetch: 
    MaxRetries: 25
    RetryDelayMs: 1000
  DeviceStatePersistence: false
  AutoStartServices: false
  ExitOnServiceFailure: false
  LogLevel: 'Trace'
schema:
  Mqtt: 
    AutoConfig: bool
    Host: str?
    Port: "int(0,65535)?"
    Id: str?
    Pw: password?
    Tls: bool?
  SwitchBot: 
    ApiBaseUrl: str
    ApiKey: str
    ApiSecret: password
  EnforceDeviceTypes:
    - DeviceId : str
      DeviceType : str
  WebhookService: 
    TunnelMode: list(Disabled|HostUrl|Ngrok|TryCloudflare|CloudflareZeroTrust)
    NgrokAuthToken: str?
    HostUrl: str?
    CloudflareTunnelToken: str?
  MessageRetain:
    Entity: bool
    State: bool
  ImageFetch: 
    MaxRetries: "int(0,100)"
    RetryDelayMs: "int(0,30000)"
  DeviceStatePersistence: bool
  AutoStartServices: bool
  ExitOnServiceFailure: bool?
  LogLevel: list(Trace|Debug|Information|Warning|Error|Critical|None)
